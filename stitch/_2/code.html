<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>

<title>柠檬字幕工作室 - 编辑器</title>

                    "inverse-primary": "#005bc0",

                    "surface-dim": "#131313",
                    "surface": "#131313",
                    "on-primary-fixed-variant": "#004493",

                    "on-primary-container": "#ffffff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #414754;
            border-radius: 10px;
        }
        .subtitle-active {
            box-shadow: inset 0 0 0 2px #adc7ff;
            background-color: rgba(26, 115, 232, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md overflow-hidden h-screen flex flex-col">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="flex items-center justify-between px-edge-margin w-full h-16 bg-background">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-200">
                arrow_back
            </button>
<h1 class="font-headline-md text-headline-md font-bold text-on-background">柠檬字幕工作室</h1>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-200">
                history
            </button>
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-200">
                more_vert
            </button>
</div>
</header>
<!-- Main Editor Content -->
<main class="flex-1 flex flex-col overflow-hidden">
<!-- Upper Half: Video Player -->
<section class="w-full aspect-video bg-black relative group">
<div class="absolute inset-0 flex items-center justify-center">
<img class="w-full h-full object-contain" data-alt="A cinematic 16:9 still of a tranquil Japanese landscape during golden hour. Soft amber light catches the edges of cherry blossom branches in the foreground, with a mist-covered mountain peak in the distance. The overall aesthetic is professional, high-resolution, and color-graded for a modern film look, utilizing a rich palette of deep oranges and soft purples to match the dark UI context." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsxNe9NdVXShgzV6F_4SItZrx6l3DqzGl1Wg-1QrlooPTEHifgJYN6C2Ri22dPzWOMq5igdx1ZcUJDgs1pR8oj2jgfRpKvNiBu8CkNFn7mgMpolIt2ZtrB-ELZLC6Q-CXTubWhyAbONw0TPrOn7qqBUoqXmQ_1epqSs4FYG6NB2bVpheMopdYm2ewqjgYxpRvUaSToZ6Fz08xPAJ73m5VACVCZ4wA33iaosXI8XA2n83rTlYdfy95MMb510IsUmHvkYHhMA9xenusr"/>
<!-- Play Overlay -->
<button class="bg-black/40 text-white rounded-full p-4 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity active:scale-90">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Video Controls -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
<!-- Seek Bar -->
<div class="relative w-full h-1 bg-surface-container-high rounded-full mb-4">
<div class="absolute top-0 left-0 h-full bg-primary-container w-1/3 rounded-full"></div>
<div class="absolute top-1/2 left-1/3 -translate-y-1/2 w-3 h-3 bg-primary rounded-full shadow-lg"></div>
</div>
<div class="flex items-center justify-between text-white">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-2xl active:scale-90">play_arrow</button>
<button class="material-symbols-outlined text-2xl active:scale-90">skip_next</button>
<button class="material-symbols-outlined text-2xl active:scale-90">volume_up</button>
<span class="font-code-sm text-code-sm">00:04:12 / 00:12:34</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-2xl active:scale-90">closed_caption</button>
<button class="material-symbols-outlined text-2xl active:scale-90">fullscreen</button>
</div>
</div>
</div>
</section>
<!-- Lower Half: Subtitle List -->
<section class="flex-1 bg-surface flex flex-col overflow-hidden">
<!-- Subtitle List Toolbar -->
<div class="flex items-center justify-between px-4 py-2 bg-surface-container-low border-b border-outline-variant/30">
<div class="flex gap-2">
<button class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full text-label-lg font-label-lg">编辑</button>
<button class="px-3 py-1 text-on-surface-variant hover:bg-surface-container-high rounded-full text-label-lg font-label-lg transition-colors">波形</button>
</div>
<div class="flex items-center gap-1">
<button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full">search</button>
<button class="material-symbols-outlined p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full">add_circle</button>
</div>
</div>
<!-- Scrollable List -->
<div class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
<!-- Subtitle Item 1 -->
<div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20 subtitle-active">
<div class="flex justify-between items-center mb-2">
<span class="text-primary font-code-sm text-code-sm">00:04:10.000 — 00:04:14.500</span>
<button class="material-symbols-outlined text-on-surface-variant text-sm">content_copy</button>
</div>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface font-body-md focus:ring-0 resize-none h-10">这是一个带有电影质感的日本风景空镜。</textarea>
<div class="mt-2 h-px bg-outline-variant/30 w-full"></div>
<textarea class="w-full bg-transparent border-none p-0 mt-2 text-on-surface-variant font-body-md focus:ring-0 resize-none h-10 italic">This is a cinematic empty shot of Japanese scenery.</textarea>
</div>
<!-- Subtitle Item 2 -->
<div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20 hover:border-outline transition-colors">
<div class="flex justify-between items-center mb-2">
<span class="text-on-surface-variant font-code-sm text-code-sm">00:04:14.500 — 00:04:18.200</span>
<button class="material-symbols-outlined text-on-surface-variant text-sm">content_copy</button>
</div>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface font-body-md focus:ring-0 resize-none h-6">远处的富士山在晨曦中若隐若现。</textarea>
</div>
<!-- Subtitle Item 3 -->
<div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20 hover:border-outline transition-colors">
<div class="flex justify-between items-center mb-2">
<span class="text-on-surface-variant font-code-sm text-code-sm">00:04:18.200 — 00:04:22.000</span>
<button class="material-symbols-outlined text-on-surface-variant text-sm">content_copy</button>
</div>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface font-body-md focus:ring-0 resize-none h-6">这种光影效果给画面增添了层次感。</textarea>
</div>
<!-- Subtitle Item 4 -->
<div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20 hover:border-outline transition-colors">
<div class="flex justify-between items-center mb-2">
<span class="text-on-surface-variant font-code-sm text-code-sm">00:04:22.000 — 00:04:26.150</span>
<button class="material-symbols-outlined text-on-surface-variant text-sm">content_copy</button>
</div>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface font-body-md focus:ring-0 resize-none h-6">欢迎来到柠檬字幕工作室的教程频道。</textarea>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar (Transactional Context: Export & Preview) -->
<footer class="h-20 bg-surface-container border-t border-outline-variant/20 flex items-center justify-between px-6 pb-2">
<div class="flex flex-col gap-1">
<span class="text-on-surface-variant font-label-lg text-[10px] uppercase tracking-wider">PREVIEW MODE</span>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
<span class="ms-3 text-body-md font-medium text-on-surface">双语预览</span>
</label>
</div>
<button class="bg-primary-container text-on-primary-container px-8 py-3 rounded-xl font-bold flex items-center gap-2 active:scale-95 transition-transform shadow-lg" id="export-btn">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">download</span>
            导出字幕
        </button>
</footer>
<!-- Export Dialog (Micro-interaction) -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6" id="export-dialog">
<div class="bg-surface-container-high w-full max-w-xs rounded-3xl p-6 shadow-2xl scale-90 opacity-0 transition-all duration-300 transform" id="dialog-content">
<h3 class="text-title-lg font-title-lg text-on-surface mb-6 text-center">导出格式</h3>
<div class="space-y-3">
<button class="w-full py-4 px-6 bg-surface-container-highest rounded-2xl flex items-center justify-between hover:bg-surface-bright transition-colors active:scale-95">
<span class="font-bold">SRT (标准格式)</span>
<span class="material-symbols-outlined text-primary">check_circle</span>
</button>
<button class="w-full py-4 px-6 bg-surface-container-highest rounded-2xl flex items-center justify-between hover:bg-surface-bright transition-colors active:scale-95">
<span class="font-bold">VTT (Web格式)</span>
<span class="material-symbols-outlined text-on-surface-variant">circle</span>
</button>
<button class="w-full py-4 px-6 bg-surface-container-highest rounded-2xl flex items-center justify-between hover:bg-surface-bright transition-colors active:scale-95">
<span class="font-bold">ASS (特效字幕)</span>
<span class="material-symbols-outlined text-on-surface-variant">circle</span>
</button>
</div>
<div class="mt-8 flex gap-3">
<button class="flex-1 py-3 text-primary font-bold" id="close-dialog">取消</button>
<button class="flex-1 py-3 bg-primary-container text-on-primary-container rounded-full font-bold">开始导出</button>
</div>
</div>
</div>
<script>
        const exportBtn = document.getElementById('export-btn');
        const dialog = document.getElementById('export-dialog');
        const dialogContent = document.getElementById('dialog-content');
        const closeDialog = document.getElementById('close-dialog');

        exportBtn.addEventListener('click', () => {
            dialog.classList.remove('hidden');
            setTimeout(() => {
                dialogContent.classList.remove('scale-90', 'opacity-0');
                dialogContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        });

        closeDialog.addEventListener('click', () => {
            dialogContent.classList.add('scale-90', 'opacity-0');
            dialogContent.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                dialog.classList.add('hidden');
            }, 300);
        });

        // Click outside to close
        dialog.addEventListener('click', (e) => {
            if (e.target === dialog) {
                closeDialog.click();
            }
        });

        // Simple play/pause simulation
        const playBtn = document.querySelector('.group button');
        playBtn.addEventListener('click', () => {
            const icon = playBtn.querySelector('span');
            icon.textContent = icon.textContent === 'play_arrow' ? 'pause' : 'play_arrow';
        });
    </script>
</body></html>
