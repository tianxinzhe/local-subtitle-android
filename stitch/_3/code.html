<script>
        // Micro-interactions for precision mode switcher
        const precisionButtons = document.querySelectorAll('.flex.bg-surface-container-low button');
        precisionButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                precisionButtons.forEach(b => {
                    b.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                    b.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
                });
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container');
                btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
            });
        });

        // Ripples simulation on list items
        document.querySelectorAll('.settings-list-item').forEach(item => {
            item.addEventListener('click', function(e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
<style>
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            animation: ripples 0.6s linear;
            width: 0;
            height: 0;
        }
        @keyframes ripples {
            from { width: 0; height: 0; opacity: 0.5; }
            to { width: 500px; height: 500px; opacity: 0; }
        }
    </style>
</body></html>
